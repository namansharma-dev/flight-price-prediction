<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flight Price Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#2b5876,#4e4376);
min-height:100vh;
color:white;
}

.container-box{
max-width:950px;
margin:60px auto;
padding:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.title{
text-align:center;
font-size:32px;
font-weight:600;
margin-bottom:30px;
}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:25px;
}

.card-box{
background:white;
color:#333;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.card-box label{
font-weight:500;
margin-bottom:6px;
display:block;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.submit-btn{
display:block;
margin:25px auto;
background:#ff7b00;
border:none;
padding:12px 35px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.submit-btn:hover{
background:#ff5500;
transform:scale(1.05);
}

.result{
text-align:center;
font-size:24px;
font-weight:500;
margin-top:20px;
}

.footer{
text-align:center;
margin-top:40px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container-box">

<div class="title">
<i class="fa-solid fa-plane-departure"></i> Flight Price Predictor
</div>

<form action="/predict" method="post">

<div class="form-row">

<div class="card-box">
<label>Departure Time</label>
<input type="datetime-local" name="Dep_Time" required>
</div>

<div class="card-box">
<label>Arrival Time</label>
<input type="datetime-local" name="Arrival_Time" required>
</div>

</div>


<div class="form-row">

<div class="card-box">
<label>Source</label>
<select name="Source" required>
<option value="Delhi">Delhi</option>
<option value="Kolkata">Kolkata</option>
<option value="Mumbai">Mumbai</option>
<option value="Chennai">Chennai</option>
</select>
</div>

<div class="card-box">
<label>Destination</label>
<select name="Destination" required>
<option value="Cochin">Cochin</option>
<option value="Delhi">Delhi</option>
<option value="New Delhi">New Delhi</option>
<option value="Hyderabad">Hyderabad</option>
<option value="Kolkata">Kolkata</option>
</select>
</div>

</div>


<div class="form-row">

<div class="card-box">
<label>Stops</label>
<select name="stops" required>
<option value="0">Non-Stop</option>
<option value="1">1 Stop</option>
<option value="2">2 Stops</option>
<option value="3">3 Stops</option>
<option value="4">4 Stops</option>
</select>
</div>

<div class="card-box">
<label>Airline</label>
<select name="airline" required>
<option value="Jet Airways">Jet Airways</option>
<option value="IndiGo">IndiGo</option>
<option value="Air India">Air India</option>
<option value="Multiple carriers">Multiple carriers</option>
<option value="SpiceJet">SpiceJet</option>
<option value="Vistara">Vistara</option>
<option value="Air Asia">Air Asia</option>
<option value="GoAir">GoAir</option>
<option value="Multiple carriers Premium economy">Multiple carriers Premium economy</option>
<option value="Jet Airways Business">Jet Airways Business</option>
<option value="Vistara Premium economy">Vistara Premium economy</option>
<option value="Trujet">Trujet</option>
</select>
</div>

</div>

<button class="submit-btn">Predict Price</button>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

<div class="footer">
© 2025 Naman Sharma
</div>

</div>

</body>
</html>
